const convertTime = (timeStr) => {
    if (!timeStr) return 0;
    const parts = timeStr.split(':');
    const m = parseInt(parts[0], 10);
    const sParts = parts[1].split('.');
    const s = parseInt(sParts[0], 10);
    const msStr = (sParts[1] || '0').padEnd(3, '0');
    const ms = parseInt(msStr, 10);
    return (m * 60 + s) * 1000 + ms;
}

const startOfAll = stopAt[0].s, stopAtSize = stopAt.length
const durationMap = new Map()
let current = 0, indexOfPosition1 = 0;
const audio = document.getElementById('bg-master');

const TOTAL_MAX_TIME = (11 * 60 + 29) * 1000, CYCLE = 6;
const animationLoop = (timestamp) => {
// 🌟 核心修复 1：直接读取音频当前的绝对精确播放位置（秒 * 1000 = 毫秒）
    const audioCurrentTime = audio.currentTime * 1000;

    // 🌟 核心修复 2：计算两帧之间，音频真正流逝的时间差（用于精准累加各个 key 的 duration）
    const dt = audioCurrentTime - current;
    current = audioCurrentTime; // 将视觉时间轴与音频完全强绑定

    if (current < startOfAll) {
        for (let j = 0; j < 8; j++) {
            renderPortrait(j, false)
        }
    } else {
        let renderedLastPosition = false
        for (let i = indexOfPosition1; i < stopAtSize; i++) {
            const { s, e, position, name } = stopAt[i]
            const start = s, end = e
            // console.log(current, start, end)
            if (renderedLastPosition) break;
            if (current >= start && current <= end) {
                let duration = durationMap.get(name) || 0
                duration += dt
                durationMap.set(name, duration);
                renderPortrait(i, true)
                render('ar-' + position, true, { sec: (duration / 1000).toFixed(1), per: (duration * 100 / TOTAL_MAX_TIME).toFixed(1) })
                if (position === CYCLE) {
                    renderedLastPosition = true
                }
            }
            else if (current > end) {
                renderPortrait(i, false)
                if (position === CYCLE) {
                    indexOfPosition1 = i + 1;
                    for (let _ = 1; _ <=  CYCLE; _++)
                        render('ar-' + _, true, {  })
                }
            } else if (current < start) {
                // break
                renderPortrait(i, false)
                if (position === CYCLE) {
                    break
                }
            }
        }
    }
    renderLyrics(current)
    requestAnimationFrame(animationLoop);
}
const index2Image = new Map(), index2Filter = new Map()
const renderPortrait = (index, on) => {
    const { position, name, portrait, bgSize, bgPos, color } = stopAt[index];
    const el = document.getElementById('ar-' + position);

    const nameNode = el.querySelector('.name');
    nameNode.textContent = name
    const countdownNode = el.querySelector('.countdown')

    const originImage = index2Image.get(index)
    const newImage = `url('portrait/${portrait}')`
    const originGrayscale = index2Filter.get(index)
    const newGrayscale = on ? 'grayscale(0)' : 'grayscale(90%)'
    if (originImage !== newImage) {
        console.log(originImage, newImage)
        const portraitNode = el.querySelector('.portrait')
        portraitNode.style.backgroundPosition = bgPos || '50% 50%';
        portraitNode.style.backgroundSize = bgSize || 'cover';
        portraitNode.style.filter = newGrayscale;
        portraitNode.style.backgroundImage = newImage
        index2Image.set(index, newImage);
        index2Filter.set(index, newGrayscale);
        countdownNode.style.backgroundColor = color
        countdownNode.style.filter = newGrayscale
        el.classList.toggle('active', !!on);
    } else if (originGrayscale !== newGrayscale) {
        const portraitNode = el.querySelector('.portrait')
        portraitNode.style.filter = newGrayscale;
        index2Filter.set(index, newGrayscale);
        el.classList.toggle('active', !!on);
        countdownNode.style.filter = newGrayscale
    }
}

const render = (id, isShow, data = {}) => {
    const el = document.getElementById(id);
    if (!el) return; // 容错处理：找不到元素直接返回
    // 1. 控制显隐
    el.style.display = isShow ? '' : 'none'; // '' 表示恢复 CSS 中默认的布局方式(如 flex/grid)
    // 2. 如果显示且传入了数据，则更新子元素
    if (isShow) {
        const secNode = el.querySelector('.sec-container');
        if (secNode) {
            secNode.querySelector('.value').textContent = data.sec || ''
            secNode.querySelector('.unit').textContent = data.sec ? 's' : ''
        }
        const perNode = el.querySelector('.per-container');
        if (perNode) {
            perNode.querySelector('.value').textContent = data.per || ''
            perNode.querySelector('.unit').textContent = data.per ? '%' : ''
        }
    }
}

const shiftQrcTime = async (n) => {
    // 1. 核心：高精度时间格式化工具（将毫秒数还原为 mm:ss.ms 格式并精准补零）
    const formatTime = (totalMs) => {
        if (totalMs < 0) totalMs = 0; // 容错：时间不能小于 0
        const m = Math.floor(totalMs / 60000);
        const s = Math.floor((totalMs % 60000) / 1000);
        const ms = totalMs % 1000;

        const mStr = String(m).padStart(2, '0');
        const sStr = String(s).padStart(2, '0');
        const msStr = String(ms).padStart(3, '0');

        return `${mStr}:${sStr}.${msStr}`;
    };

    // 3. 正则表达式：同时匹配 [00:38.016] 和 <00:38.016> 内部的时间
    // ([\[<]) 捕获左边界符号，(\d+:\d+\.\d+) 捕获时间轴，([\]>]) 捕获右边界符号
    const timeRegex = /([\[<])(\d+:\d+\.\d+)([\]>])/g;

    const [response1] = await Promise.all([
        fetch('lyrics/kr-words.lrc'),  // 韩文 QRC 混合文本
    ]);
    let [origin] = await Promise.all([
        response1.text()
    ]);
    // 4. 执行替换并返回结果
    let text = origin.replace(timeRegex, (match, leftBracket, timeStr, rightBracket) => {
        const originalMs = convertTime(timeStr);
        const newMs = originalMs - n; // 往前调整 n 毫秒
        return `${leftBracket}${formatTime(newMs)}${rightBracket}`;
    });
    console.log(text);
}

let lyricNodes
const initLyrics = async () => {
    try {
        const [response1, response2] = await Promise.all([
            fetch('lyrics/kr-words.qrc'),  // 韩文 QRC 混合文本
            fetch('lyrics/v3.md')   // 中文 纯文本
        ]);

        if (!response1.ok || !response2.ok) {
            throw new Error(`文件获取失败! 状态码: 文件1(${response1.status}), 文件2(${response2.status})`);
        }

        const [krText, cnText] = await Promise.all([
            response1.text(),
            response2.text()
        ]);
        console.log('🚀 两个新格式文本文件读取成功！');

        const OFFSET = 0;
        const convertLyricTime = (str) => {
            if (!str) return 0;
            // 清理掉可能残余的括号
            const cleanStr = str.replace(/[\[\]<>]/g, '').trim();
            const match = cleanStr.match(/(\d+):(\d+)\.(\d+)/);

            if (match) {
                const m = parseInt(match[1], 10);
                const s = parseInt(match[2], 10);
                let msStr = match[3];

                // 补齐毫秒数位（防止出现 .64 实际代表 640ms 的情况）
                if (msStr.length === 2) msStr += '0';
                if (msStr.length === 1) msStr += '00';
                const ms = parseInt(msStr, 10);

                return (m * 60 + s) * 1000 + ms + OFFSET;
            }
            return 0;
        };


        const lyricMap = new Map();

        // 🌟 核心改进 2：KR 新正则解析
        // ^( ?)             -> 组1: 匹配可能存在的行首空格 (isolated)
        // (\d+)             -> 组2: 匹配唯一标识 ID
        // \s+\[(\d+:\d+\.\d+)\] -> 组3: 匹配整行绝对开始时间 [00:13.664]
        // \s*(.+)$          -> 组4: 匹配后续所有的 QRC 歌词主体
        const krRegex = /^( ?)(\d+)\s+\[(\d+:\d+\.\d+)\]\s*(.+)$/;

        // 1. 解析韩文一体化数据
        krText.split(/\r?\n/).forEach(line => {
            const match = line.match(krRegex);
            if (match) {
                const hasLeadingSpace = match[1] === ' ';
                const id = match[2];
                const startStr = match[3];
                const body = match[4]; // 例如: <00:13.664>바뀔 <00:14.048>...

                const lineStartTime = convertLyricTime(startStr);
                const krWords = [];

                // 🌟 巧妙切分法：利用正则将时间标签和文字剥离成两个数组
                const timeTags = body.match(/<[\d:.]+>/g) || [];  // 抓出所有 <00:13.664>
                const textParts = body.split(/<[\d:.]+>/) || []; // 抓出所有文字片段

                let cleanText = '';

                // 注意：这里用 timeTags.length - 1
                // 因为 QRC 格式的最后一个 tag（比如例子里的 <00:17.056>）后面没有字，它是专门用来卡住最后一个字结束时间的。
                for (let i = 0; i < timeTags.length - 1; i++) {
                    const wordText = textParts[i + 1] || ''; // split 留下的首位是空字符串，所以这里取 i + 1
                    const start = convertLyricTime(timeTags[i]);
                    const end = convertLyricTime(timeTags[i + 1]); // 当前字的结束时间 = 下一个字的开始时间

                    cleanText += wordText;
                    krWords.push({ w: wordText, s: start, e: end });
                }

                // 整行的结束时间，直接取这行最后一个闭合标签的时间
                const lineEndTime = krWords.length > 0 ? krWords[krWords.length - 1].e : lineStartTime;

                const lyricObj = {
                    s: lineStartTime,
                    e: lineEndTime,
                    k: cleanText, // 拼好的纯韩文字符串（用于不一致时比对）
                    c: '',
                    krWords: krWords,
                    color: '',
                };

                const matchedArtist = stopAt.find(item => {
                    return lineStartTime >= item.s && lineEndTime <= item.e;
                });

                if (matchedArtist) {
                    lyricObj.color = matchedArtist.color;
                }

                if (hasLeadingSpace) lyricObj.isolated = true;
                lyricMap.set(id, lyricObj);
            }
        });

        // 2. 解析中文（逻辑完全保留原样，用 ID 去匹配）
        const cnRegex = /^\s*(\d+)\s+(.+)$/;
        cnText.split(/\r?\n/).forEach(line => {
            const match = line.match(cnRegex);
            if (match) {
                const id = match[1];
                const text = match[2].trim();

                if (lyricMap.has(id)) {
                    const targetObj = lyricMap.get(id);
                    targetObj.c = text;

                    // 向下兼容：中文暂无单字轴，直接整句打包，让中文按整句平滑高亮
                    targetObj.cnWords = [{ w: text, s: targetObj.s, e: targetObj.e }];
                }
            }
        });


        // 3. 排序并灌入全局队列
        const mergedLyrics = Array.from(lyricMap.values()).sort((a, b) => a.s - b.s);
        lyricList.length = 0
        lyricList.push(...mergedLyrics);
        console.log(lyricList);
        let s = '';
        lyricList.forEach((lyric) => {
            lyric.krWords.forEach(word => {
                s += word.w;
            })
            s += '\n'
        })
        // console.log(s);

        // 💡 进阶补充：自动计算 'e' (结束时间)
        // 通常当前句的结束时间，就是下一句的开始时间
        // for (let i = 0; i < mergedLyrics.length; i++) {
        //     if (i < mergedLyrics.length - 1) {
        //         mergedLyrics[i].e = mergedLyrics[i + 1].s;
        //     } else {
        //         // 最后一句默认给个 3 秒的时长（或者根据你的音乐总长来定）
        //         mergedLyrics[i].e = mergedLyrics[i].s + 3000;
        //     }
        // }
        const createWordNodes = (wordList) => {
            if (!wordList || wordList.length === 0) return '';

            // 把单字数组连缀成一串 span 节点
            return wordList.map(word => {
                return `<span class="lyric-word">${word.w}</span>`;
            }).join('');
        };
        // 1. 初始化阶段：一次性生成所有 DOM 节点，并保存引用
        lyricNodes = lyricList.map((lyric) => {
            const el = document.createElement('div');
            el.className = 'lyric-line';
            el.style.color = lyric.color;

            // 🌟 新增：利用正则检测当前行是否包含阿拉伯语字符块 (\u0600-\u06FF)
            const isArabic = /[\u0600-\u06FF]/.test(lyric.k || lyric.c);
            // 如果是阿拉伯语，给这行单独加上 rtl-line 类名
            if (isArabic) el.classList.add('rtl-line');

            const isSame = (lyric.k === lyric.c) || !lyric.c || lyric.c.trim() === '';
            el.innerHTML = `
                <div class="kr lyric-text">${createWordNodes(lyric.krWords) || lyric.k}</div>
                ${isSame ? '' : `<div class="ch lyric-text">${lyric.c}</div>`}`;
            el.style.transform = `translateY(${LINE_HEIGHT * 2}px)`;
            container.appendChild(el);
            return el;
        });
        console.log(mergedLyrics)
    } catch (error) {
        console.error('❌ 初始化读取文本文件失败:', error);
    }
}

// 全局记录当前激活的歌词索引，用于判断是否需要触发排版动画
let activeIndex = -1;
// 2. 核心渲染函数 (请在 requestAnimationFrame 或你的播放器 timeupdate 中调用)
const renderLyrics = (current) => {
    // 【阶段 A】：寻找当前应该居中的歌词索引
    let newActiveIndex = -1;
    // 倒序遍历：找到最后一个 startTime <= current 的歌词
    for (let i = lyricList.length - 1; i >= 0; i--) {
        if (current >= lyricList[i].s) {
            newActiveIndex = i;
            break;
        }
    }

    // 【阶段 B】：如果居中歌词发生切换，触发排版和动画
    if (newActiveIndex !== activeIndex) {
        lyricList.forEach((lyric, i) => {
            const node = lyricNodes[i]; // 注意：和你初始化时的数组名保持一致 (domNodes 或 lyricNodes)

            const offset = i - newActiveIndex;
            let targetY = offset * LINE_HEIGHT;
            let targetOpacity = 0;
            // 1. 正在唱的当前句 (永远在中间)
            if (offset === 0) {
                targetOpacity = 1;
                // Isolated 的原地渐入效果保留
                if (lyric.isolated && (node.style.opacity === '0' || node.style.opacity === '')) {
                    node.style.transition = 'none';
                    node.style.transform = 'translateY(0px)';
                    void node.offsetWidth;
                    node.style.transition = '';
                }
            }
            // 2. 上一句 (应该出现在第一行)
            else if (offset === -1) {
                // 如果当前正在唱的是 isolated，或者上一句本身是 isolated，则不显示在第一行
                if (lyricList[newActiveIndex].isolated) {
                    targetOpacity = 0;
                } else {
                    targetOpacity = 0.3;
                }
            }
            // 3. 下一句 (应该出现在第三行)
            else if (offset === 1) {
                // 🌟 核心修复 2：
                // 只要下一句自己不是 isolated，无论当前句是不是 isolated，它都应该在第三行排队准备！
                if (lyric.isolated) {
                    targetOpacity = 0;
                } else {
                    targetOpacity = 0.3;
                }
            }
            // 4. 其他视口之外的距离
            else {
                targetOpacity = 0;
            }

            // 统一应用计算后的排版样式
            node.style.transform = `translateY(${targetY}px)`;
            node.style.opacity = targetOpacity;
            node.classList.toggle('is-center', offset === 0);
        });

        activeIndex = newActiveIndex; // 更新全局状态
    }

    // 【阶段 C】：精确到单字的逐字卡拉OK进度更新
    if (activeIndex !== -1) {
        const line = lyricList[activeIndex];
        const lineNode = lyricNodes[activeIndex]; // 当前在唱的整行 DOM 节点

        // 🌟 1. 获取这行里面所有的韩文单字节点和中文单字节点
        const krWordNodes = lineNode.querySelectorAll('.kr .lyric-word');
        // 🌟 2. 渲染韩文逐字进度
        if (line.krWords) {
            line.krWords.forEach((word, idx) => {
                const node = krWordNodes[idx];
                if (!node) return;

                let wp = 0;
                if (current < word.s) {
                    wp = 0;   /* 还没唱到这个字，全暗 */
                } else if (current > word.e) {
                    wp = 100; /* 已经唱完这个字，全亮 */
                } else {
                    // 正在唱这个字！精准计算当前字内部的百分比
                    // console.log('wp====', wp, current, word)
                    wp = ((current - word.s) / (word.e - word.s)) * 100;
                }
                // console.log('wp====', wp, current, word)
                node.style.setProperty('--wp', `${wp}%`);
                node.style.setProperty('--word-color', line.color);
            });
        }
    }
};

// 全局对象，用来存储加载好的图片 DOM，防止被垃圾回收
const PRELOADED_IMAGES = {};
let imagesLoaded = false;

const preloadAllImages = () => {
    return new Promise((resolve) => {
        // 1. 收集 stopAt 中所有不重复的图片路径
        const uniqueImages = [...new Set(stopAt.map(_ => _.portrait).filter(Boolean))];
        let loadedCount = 0;
        const totalImages = uniqueImages.length;

        if (totalImages === 0) return resolve();

        uniqueImages.forEach(imgName => {
            const img = new Image();
            const path = 'portrait/' + imgName;

            img.onload = img.onerror = () => {
                loadedCount++;
                // 当所有图片都躺在浏览器缓存里时，触发 resolve
                if (loadedCount === totalImages) {
                    console.log(`🚀 所有 ${totalImages} 张舞台图片预加载完毕，内存就绪！`);
                    resolve();
                }
            };

            img.src = path;
            // 存入全局对象，强行驻留内存
            PRELOADED_IMAGES[imgName] = img;
        });
    });
};

const DEBUG = true;
const DEBUG_START_TIME_STRING = "00:10.375"
const toCurrentTimeStr = timeString => {
    const t = timeString.split(':');
    const minutes = parseFloat(t[0]);
    const seconds = parseFloat(t[1]);
    // 直接数学相加返回纯秒数数字
    return (minutes * 60) + seconds;
}
const DEBUG_START_TIME = toCurrentTimeStr(DEBUG_START_TIME_STRING);
const turnOn = () => {
    if (imagesLoaded) {
        audio.muted = false;
        audio.volume = 0.02;
        if (DEBUG) {
            // 🌟 新增这行：设置你想跳转的调试时间（单位：秒，支持小数）
            audio.currentTime = DEBUG_START_TIME;           // 比如直接跳到 20.5 秒
            // 🌟 新增这行：强制把你的全局视觉时钟对齐（秒 * 1000 = 毫秒）
            current = DEBUG_START_TIME * 1000;
        }
        audio.play();
        requestAnimationFrame(animationLoop);
    }
}
document.addEventListener('DOMContentLoaded', async () => {
    generateStageSlots();
    await Promise.all([initLyrics(), preloadAllImages()]);
    imagesLoaded = true;
    // 👉 补充这一行：传入你指定的毫秒数 (上面秒数 * 1000，比如 65.5秒 = 65500)
    DEBUG && renderLyrics(DEBUG_START_TIME * 1000);
});
