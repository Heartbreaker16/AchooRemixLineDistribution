<script>
const stopAt = [
    // ['00:13:280', '00:27:280', 1, 'Mirani', 'mirani.jpg', '50% 5%', '160% auto'],
    // ['00:27:280', '00:41:400', 2, 'pH-1', 'ph1.jpg', '50% 20%', '130% auto'],
    // ['00:41:300', '01:22:140', 3, 'Munchman', 'munchman.jpg', '50% 10%', '210% auto'],
    // ['01:21:900', '01:35:520', 1, 'Mirani', 'mirani.jpg', '50% 5%', '160% auto'],

    // ['01:49:200', '02:16:500', 4, 'Skinny Brown', 'SkinnyBrown.webp', '50% 5%', '100% auto'],
    // ['02:16:500', '02:44:700', 5, 'YDP Louie', 'louie.jpg', '60% 13%', '180% auto'],
    // ['02:44:280', '03:12:280', 6, 'Leellamarz', 'Leellamarz1.jpg', '0% 0%', '140% auto'],
    ['03:11:580', '03:39:603', 1, 'Ourealgoat', 'Ourealgoat_1.webp', '50% 50%', '115% auto'],
    ['03:39:600', '04:06:600', 2, 'Dbo', 'dbo.jpg', '50% 100%', '115% auto'],
    ['04:06:665', '04:48:280', 3, 'Sik-K', 'Sik-K-3.webp', '50% 54%', '170% auto'],
    ['04:48:000', '05:01:600', 4, 'pH-1', 'ph1.jpg', '50% 20%', '130% auto'],
    ['05:01:500', '05:29:200', 5, 'Owen', 'owen.webp', '70% 50%', '115% auto'],
    ['05:29:000', '05:56:800', 6, 'Kid Milli', 'KidMilli.webp', '50% 0%', '100% auto'],
    ['05:58:800', '06:58:800', 1, 'Swings', 'swings.jpg', '50% 10%', '180% auto'],
    ['05:58:800', '06:58:800', 2, 'Nudeboi Seo', 'Nudeboi_Seo_1.webp', '50% 0%', '113% auto'],
    ['05:58:800', '06:58:800', 3, 'TRADE L', 'TRADE-L-01.jpg', '50% 70%', '100% auto'],
    ['05:58:800', '06:58:800', 4, 'Coogie', 'coogie.webp', '50% 0%', '120% auto'],
    ['05:58:800', '06:58:800', 5, 'Blase', 'Blase_1.webp', '50% 10%', '150% auto'],
    ['05:58:800', '06:58:800', 6, 'sokodomo', 'sokodomo.webp', '50% 20%', '150% auto'],
    ['05:58:800', '06:58:800', 1, 'Khundi Panda', 'KhundiPanda.jpg', '50% 50%', '100% auto'],
    ['05:58:800', '06:58:800', 2, 'Lil Moshpit', 'Lil_moshpit_1.webp', '50% 10%', '250% auto'],
    ['05:58:800', '06:58:800', 3, 'Khakii', 'Khakii.jpg', '50% 0%', '100% auto'],
    ['05:58:800', '06:58:800', 4, 'JUSTHIS', 'justhis.webp', '50% 50%', '100% auto'],
    ['05:58:800', '06:58:800', 5, 'Mirani', 'mirani.jpg', '50% 5%', '160% auto'],
    ['05:58:800', '06:58:800', 6, 'pH-1', 'ph1.jpg', '50% 20%', '130% auto'],
], lyricList = [
    { s: 2000, e: 5000, k: 'La La La La La La La', c: '', isolated: true },
    { s: 7000, e: 8500, k: 'Groovy everywhere', c: '', isolated: true },
    { s: 9550, e: 11000, k: '바뀔 시간이 됐어, we go up with party', c: '扭转乾坤，狂欢中扶摇直上', isolated: true },
    { s: 12000, e: 15000, k: '벌어 cash, fame, 이젠 이뤄 내 자리', c: '名利双收，如今我步入殿堂' },
    { s: 16000, e: 17040, k: 'My way, 봐, 허덕이다 하늘까지', c: '看我从泥潭挣扎一路冲向云霄' },
    { s: 17940, e: 18500, k: '얼어붙은 삶을 바꿔', c: '打破冰封的宿命' },
    { s: 18500 , e: 19000, k: '더이상 더이상 떨지 않지', c: '再不寒冷，再无彷徨' },
    { s: 20500 , e: 21000, k: 'I got the win', c: '我凯旋归来，气宇轩昂', isolated: true  },
]
const remainedIndexSet = new Set()
const stopAtSize = stopAt.length
// stopAt.forEach((item, index) => remainedIndexSet.add(index))
const durationMap = new Map()
let current = 0, currentIndex = 0, indexOfPosition1 = 0;
let lastScanStart = 0, lastRenderPortraitAtIndexSet = new Set();
const audio = document.getElementById('bg-master');

const TOTAL_MAX_TIME = (11 * 60 + 29) * 1000, CYCLE = 6;
let lastTime = performance.now(); // 记录上一次执行的高精度时间戳
const animationLoop = (timestamp) => {
// 🌟 核心修复 1：直接读取音频当前的绝对精确播放位置（秒 * 1000 = 毫秒）
    const audioCurrentTime = audio.currentTime * 1000;

    // 🌟 核心修复 2：计算两帧之间，音频真正流逝的时间差（用于精准累加各个 key 的 duration）
    const dt = audioCurrentTime - current;
    current = audioCurrentTime; // 将视觉时间轴与音频完全强绑定

    // const removeList = []
    const positionSet = new Set()
    let startIndex = indexOfPosition1;
    if (current < startOfAll) {
        for (let j = 0; j < 8; j++) {
            renderPortrait(j, false)
        }
    } else {
        let renderedLastPosition = false
        for (let i = indexOfPosition1; i < stopAtSize; i++) {
            const infos = stopAt[i]
            const start = convertTime(infos[0]), end = convertTime(infos[1]), position = infos[2], key = infos[3];
            if (renderedLastPosition) break;
            // positionSet.add(position);
            if (current >= start && current <= end) {
                let duration = durationMap.get(key) || 0
                duration += dt
                durationMap.set(key, duration);
                renderPortrait(i, true)
                render('ar-' + position, true, { sec: (duration / 1000).toFixed(1) + 's', per: (duration * 100 / TOTAL_MAX_TIME).toFixed(1) + '%' })
                if (position === CYCLE) {
                    renderedLastPosition = true
                }
            }
            else if (current > end) {
                renderPortrait(i, false)
                if (position === CYCLE) {
                    indexOfPosition1 = i + 1;
                    render('ar-' + 1, true, {  })
                    render('ar-' + 2, true, {  })
                    render('ar-' + 3, true, {  })
                    render('ar-' + 4, true, {  })
                    render('ar-' + 5, true, {  })
                    render('ar-' + 6, true, {  })
                }
            } else if (current < start) {
                // break
                renderPortrait(i, false)
                if (position === CYCLE) {
                    break
                }
            }
        }
    }
    renderLyrics(current)
    // removeList.forEach(_index => remainedIndexSet.delete(_index))
    requestAnimationFrame(animationLoop);
}
const index2Image = new Map(), index2Filter = new Map()
const renderPortrait = (index, on) => {
    const infos = stopAt[index];
    const position = infos[2], key = infos[3], imgName = infos[4], crop = infos[5], scale = infos[6];
    const el = document.getElementById('ar-' + position);

    const nameNode = el.querySelector('.name');
    nameNode.textContent = key

    const originImage = index2Image.get(index)
    const newImage = `url('portrait/${imgName}')`
    const originGrayscale = index2Filter.get(index)
    const newGrayscale = on ? 'grayscale(0)' : 'grayscale(90%)'
    if (originImage !== newImage) {
        console.log(originImage, newImage)
        const portraitNode = el.querySelector('.portrait')
        portraitNode.style.backgroundPosition = crop || '50% 50%';
        portraitNode.style.backgroundSize = scale || 'cover';
        portraitNode.style.filter = newGrayscale;
        portraitNode.style.backgroundImage = `url('portrait/${imgName}')`;
        index2Image.set(index, newImage);
        index2Filter.set(index, newGrayscale);
    } else if (originGrayscale !== newGrayscale) {
        const portraitNode = el.querySelector('.portrait')
        portraitNode.style.filter = newGrayscale;
        index2Filter.set(index, newGrayscale);
    }
}

const render = (id, isShow, data = {}) => {
    const el = document.getElementById(id);
    if (!el) return; // 容错处理：找不到元素直接返回
    // 1. 控制显隐
    el.style.display = isShow ? '' : 'none'; // '' 表示恢复 CSS 中默认的布局方式(如 flex/grid)
    // 2. 如果显示且传入了数据，则更新子元素
    if (isShow) {
        const secNode = el.querySelector('.sec');
        if (secNode) secNode.textContent = data.sec || '';
        const perNode = el.querySelector('.per');
        if (perNode) perNode.textContent = data.per || '';
    }
}

const container = document.getElementById('lyrics-container');
const LINE_HEIGHT = 90; // 每一行滚动的基础高度偏移量

// 1. 初始化阶段：一次性生成所有 DOM 节点，并保存引用
const domNodes = lyricList.map((lyric) => {
    const el = document.createElement('div');
    el.className = 'lyric-line';
    el.innerHTML = `
        <div class="kr lyric-text">${lyric.k}</div>
        <div class="ch lyric-text">${lyric.c}</div>
    `;
    // 初始状态隐藏在视口下方
    el.style.transform = `translateY(${LINE_HEIGHT * 2}px)`;
    container.appendChild(el);
    return el;
});

// 全局记录当前激活的歌词索引，用于判断是否需要触发排版动画
let activeIndex = -1;
// 2. 核心渲染函数 (请在 requestAnimationFrame 或你的播放器 timeupdate 中调用)
const renderLyrics = (current) => {
    // 【阶段 A】：寻找当前应该居中的歌词索引
    let newActiveIndex = -1;
    // 倒序遍历：找到最后一个 startTime <= current 的歌词
    for (let i = lyricList.length - 1; i >= 0; i--) {
        if (current >= lyricList[i].s) {
            newActiveIndex = i;
            break;
        }
    }

    // 【阶段 B】：如果居中歌词发生切换，触发排版和动画
    if (newActiveIndex !== activeIndex) {
        const isNewIsolated = lyricList[newActiveIndex]?.isolated;

        lyricList.forEach((lyric, i) => {
            const node = domNodes[i];
            let targetY = 0;
            let targetOpacity = 0;

            if (isNewIsolated) {
                // 处理 Isolated: true 的特殊逻辑
                if (i === newActiveIndex) {
                    targetY = 0;
                    targetOpacity = 1;
                    // 【细节优化】如果它是凭空出现的，取消它的滑动过程，强制在原地渐入
                    if (node.style.opacity === '0' || node.style.opacity === '') {
                        node.style.transition = 'none'; // 暂禁动画
                        node.style.transform = 'translateY(0px)';
                        void node.offsetWidth; // 触发浏览器重排，使 translateY(0) 立即生效
                        node.style.transition = ''; // 恢复动画
                    }
                } else {
                    // 其他所有歌词：【原地渐出消失】
                    // 核心：不要修改 targetY (不更新 transform)，只把 opacity 设为 0
                    node.style.opacity = '0';
                    node.classList.remove('is-center');
                    return; // 跳过下方的 transform 设置
                }
            } else {
                // 处理正常滚动逻辑
                const offset = i - newActiveIndex;
                targetY = offset * LINE_HEIGHT;

                if (offset === 0) { // 正在唱的
                    targetOpacity = 1;
                } else if (offset === -1) { // 上一句
                    targetOpacity = 0.3;
                } else if (offset === 1) { // 下一句
                    // 【特殊处理】：如果下一句是 isolated，它“永远不能出现在第三行”
                    targetOpacity = lyricList[i].isolated ? 0 : 0.3;
                } else { // 视口之外
                    targetOpacity = 0;
                }
            }

            // 应用计算后的排版样式
            node.style.transform = `translateY(${targetY}px)`;
            node.style.opacity = targetOpacity;
            node.classList.toggle('is-center', i === newActiveIndex);
        });

        activeIndex = newActiveIndex; // 更新全局状态
    }

    // 【阶段 C】：计算并更新卡拉OK进度
    if (activeIndex !== -1) {
        const line = lyricList[activeIndex];
        let p = 0;
        if (current >= line.s && current <= line.e) {
            p = ((current - line.s) / (line.e - line.s)) * 100; // 计算百分比
        } else if (current > line.e) {
            p = 100; // 唱完了保持全满
        }
        // 通过 CSS 变量更新 UI
        domNodes[activeIndex].style.setProperty('--p', `${p}%`);
    }
};

// 全局对象，用来存储加载好的图片 DOM，防止被垃圾回收
const PRELOADED_IMAGES = {};
let imagesLoaded = false;

const preloadAllImages = () => {
    return new Promise((resolve) => {
        // 1. 收集 stopAt 中所有不重复的图片路径
        const uniqueImages = [...new Set(stopAt.map(infos => infos[4]).filter(Boolean))];
        let loadedCount = 0;
        const totalImages = uniqueImages.length;

        if (totalImages === 0) return resolve();

        uniqueImages.forEach(imgName => {
            const img = new Image();
            const path = 'portrait/' + imgName;

            img.onload = img.onerror = () => {
                loadedCount++;
                // 当所有图片都躺在浏览器缓存里时，触发 resolve
                if (loadedCount === totalImages) {
                    console.log(`🚀 所有 ${totalImages} 张舞台图片预加载完毕，内存就绪！`);
                    resolve();
                }
            };

            img.src = path;
            // 存入全局对象，强行驻留内存
            PRELOADED_IMAGES[imgName] = img;
        });
    });
};


const turnOn = () => {
    if (imagesLoaded) {
        audio.muted = false;
        audio.play();
        requestAnimationFrame(animationLoop);
    }
}

const convertTime = (str) => {
    const tArray = str.split(':');
    return (+tArray[0] * 60 + +tArray[1]) * 1000 + +tArray[2];
}
const startOfAll = convertTime(stopAt[0][0])

document.addEventListener('DOMContentLoaded', async () => {
    // 1. 先在后台全力下载图片（十几张图通常在半秒内搞定）
    await preloadAllImages();
    imagesLoaded = true;
});
</script>

    background-size: cover;

    filter: grayscale(90%);

.grid-item .portrait.loaded {
    opacity: 1;

.grid-item .portrait.active {
    filter: grayscale(0%);

    /* transform: scale(1.02); */
}

    color: #fff;
}
.countdown .sec {
}
.countdown .per {
}
/* 歌词主容器 */
.rolling-lyrics {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 300px; /* 控制可视区域高度，假设每行80px，正好显示3行 */
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    /* 上下边缘模糊渐隐效果 */
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
}

/* 单行歌词节点 (绝对定位) */
.lyric-line {
    position: absolute;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    /*gap: 4px;*/
    /* 核心：极其丝滑的动画过渡 */
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1),
    opacity 0.4s ease,
    scale 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    opacity: 0;
    pointer-events: none;
}
/* 歌词文字与卡拉OK效果 */
.lyric-text {
    font-weight: 700;
    /* 利用 CSS 变量 --p 配合硬分界渐变，实现从左到右的高亮填充 */
    background: linear-gradient(to right, #1db954 var(--p, 0%), rgba(0, 0, 0, 0.4) var(--p, 0%));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.lyric-text.kr { font-size: 20px; }
.lyric-text.ch { font-size: 20px; font-weight: 500; }

/* 正在演唱的中间行高亮放大 */
.lyric-line.is-center { scale: 1.2; }
.lyric-line.is-center .lyric-text {
    background: linear-gradient(to right, #000000 var(--p, 0%), rgba(0, 0, 0, 0.4) var(--p, 0%));
    -webkit-background-clip: text;
}
</style>
